displayName = "LootrNerf - First Opener Advantage"
description = '''
Addon para o Lootr que implementa vantagem do primeiro jogador a abrir baús.

• Primeiro jogador: ~90% chance de loot completo
• Outros jogadores: ~10% chance, loot reduzido
• Impede farm fácil de loot, mas mantém conforto mínimo

Configurável via config/lootrnerf-server.toml
'''
