displayURL="https://github.com/treasurecompass"
logoFile="logo.png"
credits="Criado com ajuda do Claude AI"
authors="Você e Mika"
description='''
Permite vincular uma bússola a um mapa de tesouro!

Como usar:
1. Segure um mapa de tesouro em uma mão
2. Segure uma bússola na outra mão
3. Clique com o botão direito

A bússola passa a apontar para o centro da região do mapa,
facilitando encontrar o tesouro!
'''

[[dependencies.treasurecompass]]
    modId="forge"
    mandatory=true
    versionRange="[47,)"
    ordering="NONE"
    side="BOTH"

